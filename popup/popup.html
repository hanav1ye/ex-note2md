<!DOCTYPE html>
<!-- 拡張機能ポップアップ UI -->
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>note → Markdown</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="popup-header">
    <div class="popup-header-text">
      <h1>note → Markdown</h1>
      <p class="hint">note 記事を Markdown に変換します</p>
    </div>
    <button id="settingsBtn" type="button" class="settings-button" aria-label="設定" title="設定">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" />
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z" />
      </svg>
    </button>
  </header>

  <section class="option-group" aria-labelledby="sourceModeLabel">
    <h2 id="sourceModeLabel" class="option-group-title">変換元</h2>
    <div class="segmented" role="radiogroup" aria-label="変換元">
      <label class="segment">
        <input type="radio" name="sourceMode" value="tab" checked />
        <span>現在のタブ</span>
      </label>
      <label class="segment">
        <input type="radio" name="sourceMode" value="url" />
        <span>URL を指定</span>
      </label>
    </div>
    <div id="tabField" class="tab-field">
      <p class="tab-field-label">処理対象</p>
      <p id="tabArticleTitle" class="tab-article-title" aria-live="polite">—</p>
    </div>
    <div id="urlField" class="url-field hidden">
      <label for="articleUrl">記事 URL</label>
      <div class="url-picker-row">
        <input
          id="articleUrl"
          type="url"
          inputmode="url"
          placeholder="https://note.com/.../n/..."
          spellcheck="false"
        />
        <button id="pickUrlBtn" type="button" class="pick-url-button">選択する</button>
        <button id="pickMultiBtn" type="button" class="pick-url-button">複数選択</button>
      </div>
    </div>
  </section>

  <section class="option-group" aria-labelledby="tagSelectorLabel">
    <h2 id="tagSelectorLabel" class="option-group-title">タグ（候補から複数選択）</h2>
    <div id="tagSelector" class="tag-selector"></div>
    <p id="tagSelectorHint" class="tag-selector-hint">
      候補タグが未設定です。オプション画面で登録してください。
    </p>
  </section>

  <section class="option-group" aria-labelledby="outputModeLabel">
    <h2 id="outputModeLabel" class="option-group-title">変換後</h2>
    <div class="segmented" role="radiogroup" aria-label="変換後の操作">
      <label class="segment">
        <input type="radio" name="outputMode" value="copy" checked />
        <span>コピー</span>
      </label>
      <label class="segment">
        <input type="radio" name="outputMode" value="download" />
        <span>ダウンロード</span>
      </label>
    </div>
    <div id="downloadLocationField" class="download-location hidden">
      <label for="downloadPreset">保存先プリセット</label>
      <select id="downloadPreset">
        <option value="preset1">プリセット1</option>
        <option value="preset2">プリセット2</option>
        <option value="preset3">プリセット3</option>
      </select>
      <p id="downloadPresetHint" class="download-preset-hint hidden">
        ダウンロードには保存先フォルダの設定が必要です。右上の設定から「保存先プリセット設定」でフォルダを選択してください。
      </p>
    </div>
  </section>

  <div id="status" class="status" role="status"></div>
  <div id="splash" class="splash hidden" role="alert" aria-live="assertive">
    <div id="splashMark" class="splash-mark">✓</div>
    <div class="splash-text">
      <div id="splashTitle" class="splash-title">ダウンロード完了</div>
      <div id="splashMessage" class="splash-message"></div>
    </div>
  </div>

  <div class="actions">
    <button id="convertBtn" type="button">変換</button>
  </div>

  <script src="../lib/noteToMarkdown.js"></script>
  <script src="popup.js"></script>
</body>
</html>
